version: "3.8"

services:

  # ── MLFLOW TRACKING SERVER ──────────────────────────────────
  mlflow:
    image: python:3.12-slim
    container_name: mlflow-server
    working_dir: /mlflow
    volumes:
      - ../mlflow:/mlflow
    ports:
      - "5000:5000"
    command: >
      bash -c "pip install mlflow==2.14.3 setuptools==69.5.1 -q &&
               mlflow server
               --host 0.0.0.0
               --port 5000
               --backend-store-uri sqlite:///mlflow.db
               --default-artifact-root /mlflow/artifacts"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── BENTOML API SERVICE ─────────────────────────────────────
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: house-price-api
    ports:
      - "3000:3000"
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    depends_on:
      - mlflow
    restart: unless-stopped

networks:
  default:
    name: house-price-network
